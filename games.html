<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="games-style.css">
    <title>kpolr.xyz: games</title>
</head>
<body>
    <div class="header">
        <div class="title">
            <p>kpolr.xyz</p>
        </div>
        <div class="links">
            <div class="home">
                <a href="index.html">home</a>
            </div>
            <div class="games">
                <a href="games.html">games</a>
            </div>
            <div class="about">
                <a href="about.html">about</a>
            </div>
        </div>
    </div>
    <div class="body">
        <div class="grid-container">
            <div class="pantheon-container">
                <div class="pantheon-text">
                    <b>The Pantheon</b>
                    <p>its a roguelike but a bullet hell also...</p>
                </div>
                <div class="pantheon-image">
                    <img src="images/the_pantheon.png">
                </div>
            </div>
            <div class="chicken-container">
                <div class="chicken-text">
                    <b>Spring Chicken</b>
                    <p>(made with amkiwi) mr beats stole your wheelchair</p>
                    <p>so you must climb the cliff to get revenge</p>
                </div>
                <div class="chicken-image">
                    <img src="images/spring_chicken.png">
                </div>
            </div>
            <div class="rhythm-container">
                <div class="rhythm-text">
                    <b>Rhythm Circle</b>
                    <p>Short rhythm game with one button</p>
                </div>
                <div class="rhythm-image">
                    <img src="images/rhythm_circle.png">
                </div>
            </div>
        </div>
